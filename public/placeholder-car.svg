<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Honeycomb pattern subtle background -->
  <pattern id="hex" x="0" y="0" width="24" height="27.7" patternUnits="userSpaceOnUse">
    <polygon points="12,0 24,6.925 24,20.775 12,27.7 0,20.775 0,6.925" fill="none" stroke="rgba(212,165,74,0.04)" stroke-width="0.5"/>
  </pattern>
  <rect width="600" height="400" fill="url(#hex)"/>
  <!-- Simplified car silhouette -->
  <g transform="translate(300, 220)">
    <!-- Body -->
    <path d="M -180 0 L -160 -40 Q -130 -70, -80 -75 L 80 -75 Q 130 -70, 160 -40 L 180 0 L 180 30 L -180 30 Z" fill="url(#body)" stroke="rgba(212,165,74,0.2)" stroke-width="1"/>
    <!-- Windows -->
    <path d="M -130 -35 Q -100 -65, -60 -68 L 60 -68 Q 100 -65, 130 -35 L 130 -10 L -130 -10 Z" fill="rgba(212,165,74,0.05)" stroke="rgba(212,165,74,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="-65" x2="0" y2="-10" stroke="rgba(212,165,74,0.1)" stroke-width="1"/>
    <!-- Wheels -->
    <circle cx="-110" cy="30" r="22" fill="#0A0A0A" stroke="rgba(212,165,74,0.2)" stroke-width="1"/>
    <circle cx="-110" cy="30" r="10" fill="rgba(212,165,74,0.08)"/>
    <circle cx="110" cy="30" r="22" fill="#0A0A0A" stroke="rgba(212,165,74,0.2)" stroke-width="1"/>
    <circle cx="110" cy="30" r="10" fill="rgba(212,165,74,0.08)"/>
    <!-- Headlight -->
    <ellipse cx="170" cy="-5" rx="10" ry="6" fill="rgba(212,165,74,0.3)"/>
  </g>
  <text x="300" y="320" text-anchor="middle" fill="rgba(212,165,74,0.5)" font-family="Arial, sans-serif" font-size="11" letter-spacing="3" font-weight="600">PHOTO COMING SOON</text>
</svg>
